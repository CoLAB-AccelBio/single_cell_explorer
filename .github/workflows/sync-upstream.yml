name: Sync upstream

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GIT_LFS_SKIP_SMUDGE: "1"

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and sync
        run: |
          git remote add upstream https://github.com/JMarzec/single-cell-explorer-21d646ca || true
          git fetch upstream
          git checkout main
          git merge upstream/main

      - name: Install Git LFS
        run: git lfs install --local

      - name: Fetch missing LFS from upstream and upload to origin
        run: |
          # fetch only what's needed (faster than --all)
          git lfs fetch upstream main --include="public/heart_organoid_S1_3_annot.json"
          # upload LFS objects reachable from main to your fork
          git lfs push origin main
          
      - name: Allow incomplete LFS pushes (mirror upstream pointers)
        run: |
          git config lfs.allowincompletepush true

      - name: Push
        run: |
          git push --no-verify origin main
